<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-box</title>
</head>
<style>
    .container{
        border: 2px solid black;
        width: 80vw;
        height: 60vh;
        display: flex;
        justify-content:first baseline; 
        /* align-item used only for one line thing */
        align-items: center; 
        /* align-content used only for more then one line thing */
        align-content: center;
        flex-direction:column-reverse;
        flex-wrap: wrap;
        row-gap: 2px;
        column-gap: 2px;
       /* short hand gap: 40 10; // row then column */
    }

    .box{
        background-color: green;
        height: 50px;
        width: 50px;
        /* margin: 5px; */
    }
    .order-1{
        order:1;
    }
    .order-2{
        order:2;
    }
    .order-3{
        order:3;
    }
    .grow{
        /* flex-grow: 2; */
        flex-shrink: 2;
    }
</style>
<body>
    <main class="container">
        <div class="box order-3" >2</div>
        <div class="box grow" >1</div>
        <div class="box order-1" >3</div>
        <div class="box">4</div>
        <div class="box">5</div>
