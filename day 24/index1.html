<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border radius</title>
    <style>
        .radius {
            height: 100px;
            width: 100px;
            border: 20px solid black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .radius p {
            margin: 0; /* Remove default paragraph margin */
        }
    </style>
</head>
<body>
    <div class="radius">
        <p>Akshit Mehta</p>
    </div>
</body>
</html>
