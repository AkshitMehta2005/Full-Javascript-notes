<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id and class</title>
    <style>
        .red{
            color: red;
        }
        .backgroundyellow{
            background-color: yellow;
        }
        #rgb{
            color: rgb(23, 45, 63);
        }
    </style>
</head>
<body>
    <p class="red backgroundyellow">text red</p>
    <p id="rgb">color</p>
    <span class="red">sdsdsd</span>
</body>
</html>
