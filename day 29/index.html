<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card design</title>
    <style>
        *{
            margin:0;
            padding: 0;
        }
        body{
            background-color: rgb(151, 149, 145);
            margin: 20px;
        }
        .card{
            height: 400px;
            width: 300px;
            background-color: white;
            border-radius: 10px;
        }
        .photo{
            margin: 5px;
            padding: 5px;
        }
        .photo img{
            border-radius: 10px;
        }
        .btn span{
            border: 2px solid rgb(184, 168, 168);
            padding: 3px;
            border-radius: 10px;
            background-color: #ffbb54;
            /* margin: 8px; */
        }
        .btn{
            margin: 14px;
        }
        .text{
            margin: 10px;
        }
        .btn2{
            text-align: center;
        }
        .btn2 button{
            color: rgb(60, 134, 184);
            border-radius: 8px;
            padding: 8px;
            border: none;
            background-color: rgb(153, 189, 235);
        }
    </style>
</head>
<body>
    <div class="card">
      <div class="photo"><img width="280" src="wp6700622.webp" alt=""></div>
      <div class="btn">
        <span>Ram</span>
        <span>Rasiya</span>
      </div>
      <div class="text">
        <h2>Lord Hanuman</h2>
        <p>राम का हूँ भक्त मैं, रूद्र का अवतार हूँ, अंजनी का लाल हूँ मैं, दर्जनों का काल हूँ, साधुजन के साथ हूँ मैं, निर्बलों की आस हूँ, सद्गुणों का मान हूँ मैं, हां मैं हनुमान हूँ।</p>
      </div>
      <div class="btn2"><button>Read More</button></div>
    <span> &copy;Pvt.Akshit Mehta</span>
    </div>
</body>
</html>
