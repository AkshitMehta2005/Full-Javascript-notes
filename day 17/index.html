<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>different selecters</title>
    <style>
    /* element selector */
    div{
        color: blue;
    }
    /* class selector */
    .red{
        color: red;
    }
    /* id selector */
    #green{
        background-color: yellow;
    }
    /* child selector */
    div>p{
        color: aquamarine;
        background-color: burlywood;
    }
    .decendent p{
        color: rgb(249, 5, 249);
    }
    /* universal selector */
    *{
        margin: 0;
        padding: 0;
    }
    /* psuedo selector */
    a:visited{
        color: yellow;
    }
    </style>
</head>
<body>
    <div> hi there!</div>
    <div class="red" id="green">
        goast every girls->sigma male
        <p>sahi</p>
    </div>
    <div class="decendent">
       <article>
        <p>decendent</p>
       </article> 
    </div>
    
        <a href="www.google.com">GOOGLE</a>
        <a href="www.facebook.com">FACEBOOK</a>
   
</body>
</html>
