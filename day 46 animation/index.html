<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        .container{
            background-color: rgb(127, 168, 255);
            height: 50vh;
            width: 60vb;
        }
        .box{
            height: 30px;
            width: 30px;
            /* animation-name: AkshitKaAnimation;
            animation-duration: 1s;
            animation-iteration-count: 3;
            animation-timing-function: ease-in-out;
            animation-delay: 1s;
            animation-direction: alternate-reverse; */
            /* animation-play-state:paused ; */
            animation: AkshitKaAnimation 1s ease-in-out  1s 5  alternate-reverse,
            akshit2 1s ease-in-out  1s 5  alternate-reverse;
        }
        @keyframes AkshitKaAnimation {
            from{
                background-color: rgb(76, 226, 43);
            }
            to{ 
                background-color: red;
                transform: translateX(1000px);
            }
        }
        @keyframes akshit2 {
            0%{
            transform: rotate(30deg);
            background-color: red;
            }
            40%{
            transform: rotate(60deg);
            background-color: rgb(235, 189, 189);   
            }
            80%{
            transform: rotate(90deg);
            background-color: rgb(0, 4, 255)(0, 255, 115);
            }
            100%{
            transform: rotate(1800deg);
            background-color: rgb(191, 255, 0)(179, 255, 0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
    </div>
</body>
</html>
