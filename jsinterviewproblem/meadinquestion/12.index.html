<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling and event capuring</title>
    <style>
        .Parent_Parent{
            background-color: pink;
            cursor: pointer;
            padding: 3px;
            align-content: center;
            margin: 3px;
            border: 5px solid purple
        }
        .parent{
            background-color: green;
            cursor: pointer;
            padding: 3px;
            align-content: center;
            margin: 3px;
            border: 5px solid purple
        }
        .child{
            background-color: blue;
            cursor: pointer;
            padding: 3px;
            align-content: center;
            margin: 3px;
            border: 5px solid purple
        }
    </style>
</head>
<body>
    <section class="Parent_Parent">
        Parent_Parent
        <div class="parent">
            parent
            <div class="child">
                child
            </div>
        </div>
    </section>

    <script>
        
let a = document.querySelector(".Parent_Parent");
let b = document.querySelector(".parent");
let c = document.querySelector(".child");

a.addEventListener("click", (e) => {
    alert("Parent_Parent has been Clicked");
      
}); 
<!-- -> event capuring is on by default it is off -->

b.addEventListener("click", (e) => {
    alert("parent has been Clicked");
   
});

c.addEventListener("click", (e) => {
    alert("child has been Clicked");
   // e.stopPropagation();
});


    </script>
</body>
</html>
