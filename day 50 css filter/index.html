<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css filter</title>
    <style>
        .img1{
           filter: invert(3); 
        }
        .img2{
            filter: grayscale(90);
        }
        .img3{
            filter: sepia(23);
        }
    </style>
</head>
<body>
    <img class="img1" src="https://wallpapercave.com/wp/wp2722874.jpg" alt="" height="200px" width="200px">
    <img class="img2" src="https://wallpapercave.com/wp/wp2555059.jpg" alt="" height="200px" width="200px">
    <img class="img3" src="https://www.shyamparivar.com/uploads/gallery/hanuman-ji-hd-wallpaper-download-for-pc1.jpg" alt="" height="200px" width="200px">
</body>
</html>
