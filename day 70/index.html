<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .box{
         border: 2px solid black;
         padding: 4px;
         height: 30px;
         width: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>
</body>
<script>
let arr = ["red", "green", "blue", "yellow", "pink"];

let boxcolor = () => {
    let rand = Math.floor(Math.random() * arr.length);
    return arr[rand];
}

document.querySelectorAll(".box").forEach(e => {
    e.style.backgroundColor = boxcolor();
});

</script>
</html>
