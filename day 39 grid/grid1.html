<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    .container{
    height: 230px;
    width: 230px;
    border: 5px solid black;
    display: grid;
    grid-template-columns: 135px 120px;
    grid-template-rows: 90px 68px 68px;
    }
    .boxes{
        border: 2px solid green;  
        height: 30px;
        width: 30px;
    }
    /* .box4{
        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 1;
        grid-row-end: 2;
    } */ 
   
</style>
<body>
     <div class="container">
        <div class="boxes box1">1</div>
        <div class="boxes">2</div>
        <div class="boxes">3</div>
        <div class="boxes box4">4</div>
        <div class="boxes">5</div>
        <div class="boxes">6</div>
    </div>
</body>
</html>
