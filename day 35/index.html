/* .box:nth-child(even){

.boxes::before{
    content: "harry is good";
}
::selection{
    color: aqua;
    background-color: rgb(33, 5, 5);
}
.box::first-letter{
    font-size: 45px;
    color: peru;
}
div:button{
    color: blue;
    background-color: grey;
}
input::placeholder{
    background-color: black;
    color: white;
}
</style>
<body>
    <div class="boxes">
        <div class="box" data-color="padd">I am a box 1</div>
        <div class="box">I am a box 2</div>
        <div class="box">I am a box 3</div>
        <input type="text" placeholder="hi my name is akshit ">
    </div>
</body>
