<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: rgb(96, 96, 138);
        }
        *{
            padding: 0;
            margin: 0;
           
        }
        .box1{
            border: 10px solid black;
            width: 150px;
            height: 40px;
            padding: 20px;
            color: yellow;
            box-sizing: border-box;
        }
        .box2{
            border: 10px solid pink;
            width: 150px;
            padding: 20px;
            height: 60px;
            color: yellow;
            
        }
    </style>
</head>
<body>
    <div class="box box1">I am a box</div>
    <div class="box box2">I am another box</div>
</body>
</html>
