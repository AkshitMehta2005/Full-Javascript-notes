<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font family</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200&display=swap');

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
        }

        p {
            font-family: 'Baloo Bhai 2', sans-serif;
            font-family: 'Poppins', sans-serif;
            line-height: 2.3;
        }
        h2{
            text-transform: uppercase;
            text-decoration: underline;
            text-decoration-color: rgb(25, 212, 5);
            text-indent: 10rem;
            text-decoration-thickness: 12px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200&display=swap" rel="stylesheet">
</head>

<body>
    <h1>Heading</h1>
    <p>I am a paragraph</p>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ullam, architecto repudiandae deserunt dicta provident
        tenetur cumque amet. Fugit, ipsum distinctio vel velit adipisci obcaecati. Nihil, sequi reprehenderit. Maiores,
        illum modi?</p>
    <h2>Lorem ipsum dolor sit amet  </h2>
</body>

</html>
